# fly.demo.toml — apps/dashboard variante DÉMO (app okito-demo-dashboard)
#
# Déploie sur l'app démo :
#   cd apps/dashboard
#   fly deploy --config fly.demo.toml

app = "okito-demo-dashboard"
primary_region = "cdg"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
