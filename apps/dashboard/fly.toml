# fly.toml — apps/dashboard OKITO V2 (Next.js 15)
#
# Déploiement initial :
#   cd apps/dashboard
#   fly launch --no-deploy --copy-config
#   fly secrets set NEXT_PUBLIC_OKITO_API_URL=https://okito-api.fly.dev \
#                   NEXT_PUBLIC_SUPABASE_URL=https://...supabase.co \
#                   NEXT_PUBLIC_SUPABASE_ANON_KEY=...
#   fly deploy

app = "okito-dashboard"
primary_region = "cdg"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
