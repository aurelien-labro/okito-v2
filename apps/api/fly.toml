# fly.toml — apps/api OKITO V2
#
# Déploiement initial :
#   cd apps/api
#   fly launch --no-deploy --copy-config            # crée l'app, lit ce fly.toml
#   fly secrets set GEMINI_API_KEY=... DATABASE_URL=... SUPABASE_JWT_SECRET=... \
#                   RESEND_API_KEY=... RESEND_FROM_EMAIL=... \
#                   TWILIO_ACCOUNT_SID=... TWILIO_AUTH_TOKEN=... TWILIO_WHATSAPP_FROM=... \
#                   VAPI_WEBHOOK_SECRET=... INNGEST_SIGNING_KEY=... SENTRY_DSN=...
#   (liste complète, dont pipeline voix : infra/fly/DEPLOY.md)
#   fly deploy
#
# Région CDG = Paris (proche Supabase EU Paris).
#
# ⚠ /v1/voice/stream = WebSocket long-lived (appels Twilio) :
#   - auto_stop off + min_machines_running=1 (jamais 0 machine pour décrocher)
#   - concurrency par connexions (un appel ouvert compte 1, pas une requête infinie)
#   - kill_timeout 30s > drain applicatif 25s (index.ts ferme les WS sur SIGTERM)

app = "okito-api"
primary_region = "cdg"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  APP_URL = "https://dashboard.okito.app"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    soft_limit = 50
    hard_limit = 100

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Métriques Prometheus exposées sur /metrics — Fly Grafana peut les scraper.
[metrics]
  port = 8080
  path = "/metrics"
